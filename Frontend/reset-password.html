<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Abroad Vision Careerz</title>
  <link rel="stylesheet" href="styles.css?v=20260517-5" />
  <link rel="stylesheet" href="responsive.css?v=20260320-1" />
  <style>
    body { background: #f5f7fb; }
    .reset-card {
      max-width: 520px;
      margin: 80px auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.12);
    }
    .reset-card h1 { margin-top: 0; }
    .reset-card .reg-input-group { position: relative; margin-bottom: 16px; }
    .reset-card .reg-btn-orange { width: 100%; }
  </style>
</head>
<body>
  <div class="reset-card">
    <h1>Reset Password</h1>
    <p>Enter a new password to complete your reset.</p>

    <form id="resetPasswordForm">
      <div class="reg-input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="newPassword" placeholder="New Password" required autocomplete="new-password" />
      </div>
      <div class="reg-input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required autocomplete="new-password" />
      </div>
      <button type="submit" class="reg-btn-orange">Update Password</button>
    </form>
    <div id="resetMessage" style="margin-top:12px;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qokwtutsouipqkkijbdo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFva3d0dXRzb3VpcHFra2lqYmRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NDQ2OTIsImV4cCI6MjA4NzMyMDY5Mn0.oBn1lAFRhfy2vG_dmIt-AvA4S8lq-j3cRUzxcl-F5so';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('resetPasswordForm');
    const message = document.getElementById('resetMessage');

    const getTokensFromHash = () => {
      const hash = window.location.hash.replace(/^#/, '');
      const params = new URLSearchParams(hash);
      return {
        access_token: params.get('access_token'),
        refresh_token: params.get('refresh_token')
      };
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.textContent = '';

      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      if (!newPassword || newPassword.length < 8) {
        message.textContent = 'Password must be at least 8 characters.';
        return;
      }
      if (newPassword !== confirmPassword) {
        message.textContent = 'Passwords do not match.';
        return;
      }

      const { access_token, refresh_token } = getTokensFromHash();
      if (!access_token || !refresh_token) {
        message.textContent = 'Reset link is invalid or expired.';
        return;
      }

      const { error: setError } = await supabaseClient.auth.setSession({
        access_token,
        refresh_token
      });

      if (setError) {
        message.textContent = setError.message || 'Unable to verify reset link.';
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
      if (error) {
        message.textContent = error.message || 'Unable to update password.';
        return;
      }

      message.textContent = 'Password updated successfully. You can now log in.';
      message.style.color = '#10b981';
    });
  </script>
</body>
</html>
