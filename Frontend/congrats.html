<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Abroad Vision Careerz</title>
    <script>
        if (sessionStorage.getItem('isSessionActive') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Prevent full-screen blue highlight/select on mobile taps while
           allowing text input selection where needed. */
        html, body, * {
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        /* Allow text selection inside form fields */
        input, textarea, select {
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 24px;
        }

        /* Moving Background Particles Effect */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(circle, #3b82f6 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBg 20s linear infinite;
            opacity: 0.15;
        }

        @keyframes moveBg {
            from { transform: translate(0, 0); }
            to { transform: translate(-50px, -50px); }
        }

        /* Dynamic Entry Animation for Card */
        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            z-index: 10;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.1), 0 15px 30px -10px rgba(0, 0, 0, 0.05);
            
            /* Motion Effect: Scale and Bounce */
            animation: cardEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5) translateY(100px);
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Floating Icon Animation */
        .icon-box {
            width: 100px;
            height: 100px;
            background: #4ade80;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 50px;
            color: white;
            box-shadow: 0 10px 25px rgba(74, 222, 128, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Progressive Text Reveal */
        h1 {
            color: #0f172a;
            font-size: 2.4rem;
            margin-bottom: 20px;
            animation: slideIn 0.8s ease-out 0.5s both;
            font-weight: 700;
        }

        p {
            color: #475569;
            font-size: 1.1rem;
            margin-bottom: 10px;
            animation: slideIn 0.8s ease-out 0.7s both;
            line-height: 1.6;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Shiny Button Effect */
        .btn {
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #f57c00, #E43E16);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.8s ease-out 1s both;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(245, 124, 0, 0.5);
        }

        /* Shine sweep effect on button */
        .btn::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn:hover::after {
            left: 100%;
        }
        /* Mobile adjustments */
        @media (max-width: 600px) {
            html, body {
                width: 100%;
                overflow-x: hidden;
            }

            body {
                min-height: 100svh;
                overflow-y: auto;
                padding: 18px 12px;
                align-items: center;
                justify-content: center;
            }

            .card {
                padding: 28px 18px;
                border-radius: 18px;
                max-width: 420px;
                width: min(100%, 420px);
                margin: 0 auto;
                animation: none;
                opacity: 1;
                transform: none;
            }

            .icon-box { width: 80px; height: 80px; font-size: 36px; }
            h1 { font-size: 1.6rem; }
            p { font-size: 1rem; }
            .btn { padding: 12px 28px; margin-top: 18px; }
            body::before {
                inset: 0;
                width: 100%;
                height: 100%;
                background-size: 32px 32px;
                opacity: 0.08;
            }
            /* Ensure confetti canvas doesn't block interaction */
            canvas { position: fixed !important; pointer-events: none !important; z-index: 5 !important; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-box">
            <i class="fas fa-check"></i>
        </div>
        <h1>Congratulations!</h1>
        <p>Your application has been received.</p>
        <p>Get ready for your journey with <br><strong>Abroad Vision Careerz</strong></p>
        <p>Our expert counseling team will contact you shortly to guide your next steps.</p>
        
        <a href="index.html" class="btn">Return to Home</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        window.onload = () => {
            // Exploding confetti
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 }
            });

            // Side confetti launch
            setTimeout(() => {
                confetti({
                    particleCount: 50,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
                confetti({
                    particleCount: 50,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });
            }, 500);
        };
    </script>
</body>
</html>
